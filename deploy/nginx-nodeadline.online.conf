# Копия vhost: /etc/nginx/sites-available/nodeadline.online
server {
    listen 80;
    server_name nodeadline.online www.nodeadline.online;

    root /root/nodeadline.online/public;
    index default_user.html index.html;

    location /.well-known/acme-challenge/ {
        root /root/nodeadline.online/public;
    }

    location /ai_metadata/ {
        alias /root/nodeadline.online/ai_metadata/;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
