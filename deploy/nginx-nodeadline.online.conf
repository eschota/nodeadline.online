# nodeadline.online — лендинг (apex) + reverse-proxy для пользовательских поддоменов (HTTPS → WAN:порт ноды).
# Статика: /var/www/nodeadline/public
#
# Wildcard SAN на том же сертификате, что и apex (выпуск на мастере, DNS-01 Namecheap):
#   см. tools/issue_wildcard_cert.sh
# После правок: sudo nginx -t && sudo systemctl reload nginx

map $host $nodeadline_user_backend {
    default "";
    include /var/lib/nodeadline/nginx-user-backend.map;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name nodeadline.online www.nodeadline.online;

    # После certbot --expand с *.nodeadline.online путь может быть nodeadline.online-0001 — см. certbot certificates
    ssl_certificate     /etc/letsencrypt/live/nodeadline.online-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodeadline.online-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/nodeadline/public;

    location = /version.json {
        root /var/www/nodeadline/public;
        try_files /version.json =404;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /downloads/core-manifest.json {
        alias /var/www/nodeadline/public/downloads/core-manifest.json;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /downloads/SHA256SUMS {
        alias /var/www/nodeadline/public/downloads/SHA256SUMS;
        default_type text/plain;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /build.json {
        root /var/www/nodeadline/public;
        try_files /build.json =404;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /site_channel.json {
        root /var/www/nodeadline/public;
        try_files /site_channel.json =404;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /downloads/ {
        alias /var/www/nodeadline/public/downloads/;
        add_header Cache-Control "public, max-age=120";
    }

    location ^~ /Nodeadline/Core/requirements/ {
        alias /var/www/nodeadline/public/Nodeadline/Core/requirements/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /Nodeadline/ {
        alias /var/www/nodeadline/public/Nodeadline/;
    }

    location /assets/ {
        alias /var/www/nodeadline/public/assets/;
    }

    location = /site {
        return 302 /site/;
    }
    location /site/ {
        alias /var/www/nodeadline/public/site/;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

# Поддомены пользователей: HTTP → редирект на HTTPS (www и apex обрабатываются блоком выше).
server {
    listen 80;
    server_name ~^[a-z0-9-]+\.nodeadline\.online$;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ~^[a-z0-9-]+\.nodeadline\.online$;

    # После certbot --expand с *.nodeadline.online путь может быть nodeadline.online-0001 — см. certbot certificates
    ssl_certificate     /etc/letsencrypt/live/nodeadline.online-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodeadline.online-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 256m;

    location / {
        if ($nodeadline_user_backend = "") {
            return 404;
        }
        proxy_pass http://$nodeadline_user_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Нода отдаёт Location: http://sub:public_port/… — переписать на https://sub/… (порт только на стороне ноды за NAT)
        proxy_redirect ~^http://[^:]+:[0-9]+/(.*)$ https://$host/$1;
        proxy_connect_timeout 75s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
