<div id="toast-host" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="perf-overlay" class="perf-overlay" aria-live="polite">
  <div id="overlay-version" class="perf-overlay-line perf-overlay-line--ver">—</div>

<header class="app-header" id="app-header">

    <nav class="dock-row" aria-label="Навигация">

          <svg class="dock-health-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 9h2V7H4v2zm0 4h2v-2H4v2zm0 4h2v-2H4v2zm4-12h10V5H8v2zm0 6h10v-2H8v2zm0 6h10v-2H8v2z"/></svg>
        </button>
        <div id="dock-health-tooltip" class="dock-tasks-tooltip dock-health-tooltip" role="tooltip" hidden>
          <div class="dock-tasks-tooltip-inner" id="dock-health-tooltip-body">—</div>
        </div>
      </div>
      <a class="dock-tile dock-primary" id="dock-auth-guest" href="/oauth/start" title="Войти">
        <svg class="dock-icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span class="sr-only">Войти</span>

          <img id="dock-avatar" class="dock-avatar" alt="" width="40" height="40" decoding="async" referrerpolicy="no-referrer" hidden/>
          <svg id="dock-avatar-fallback" class="dock-icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>

</header>
